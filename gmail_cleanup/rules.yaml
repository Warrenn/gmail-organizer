# ============================================================================
# additive_subject_rules — Phase 2. Layer on top of any phase 1 match.
# Mirrors label_queries.json's subject_pattern_queries.
# ============================================================================

additive_subject_rules:
  - id: subject-receipts
    match:
      subject_contains_any:
        - receipt
        - invoice
        - "order confirmation"
        - "your order"
        - "thank you for your order"
        - "thank you for your purchase"
    labels: [receipts]

  - id: subject-security-notifications
    match:
      subject_contains_any:
        - "login from"
        - "new sign-in"
        - "new sign in"
        - "your trade"
        - "successful trade"
        - "purchase for"
        - "someone is accessing"
        - "unusual sign-in"
        - "security alert"
    labels: [notifications]

  - id: subject-otp
    match:
      subject_contains_any:
        - "verification code"
        - OTP
        - "one-time password"
        - "one time password"
        - "your code"
        - "login code"
        - "security code"
        - "authentication code"
        - "passcode"
        - "two-factor"
        - "2fa code"
        - "confirmation code"
        - "access code"
        - "sign-in code"
        - "sign in code"
    labels: [otp]


# ============================================================================
# fallback_rules — Phase 3. Only fires if neither phase 1 nor phase 2 produced
# any labels. First match wins within this section.
# Ported from apps-script/Classifier.gs (the current production classifier).
# ============================================================================

fallback_rules:
  # ----- User's own auto-unsubscribe emails -----
  - id: self-unsubscribe-outbox
    match:
      from_contains: warrenn@busyweb.co.za
      any_of:
        - {subject_contains: unsubscribe}
        - {subject_contains: "unsub-"}
        - {subject_contains: "unsub:"}
        - {snippet_contains: "automatically generated by gmail"}
    labels: [busyweb, _Outbox]
  - id: self-adobe-docs
    match:
      from_contains: warrenn@busyweb.co.za
      any_of:
        - {from_contains: echosign}
        - {from_contains: adobe acrobat}
    labels: [busyweb, notifications]
  - id: self-absa-work
    match:
      from_contains: warrenn@busyweb.co.za
      any_of:
        - {from_contains: absa.africa}
    labels: [work, absa]
  - id: self-busyweb-bare
    match:
      from_contains: warrenn@busyweb.co.za
    labels: [busyweb]

  # ----- ABSA work colleagues vs bank notifications -----
  - id: absa-work-colleagues
    match:
      from_contains: absa.africa
      from_not_contains_any: [cardnotification, officialemail]
    labels: [work, absa]
  - id: absa-bank-statement
    match:
      from_contains_any: [absa.co.za, absacapital, "cardnotification@absa", "officialemail@absa"]
      subject_contains_any: [statement, "credit card statement"]
    labels: [absa, finance]
  - id: absa-bank-other
    match:
      from_contains_any: [absa.co.za, absacapital, "cardnotification@absa", "officialemail@absa"]
    labels: [absa, notifications]

  # ----- Banks / trading platforms -----
