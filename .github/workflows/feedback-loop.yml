name: feedback-loop

# Autonomous label-rule refinement. Detailed design: STRATEGY.md.
# Runtime brief Claude sees: .github/prompts/feedback-loop.md.
#
# Three-job pipeline:
#   scan    — Gmail OAuth, runs feedback-scan, uploads feedback.json
#   refine  — Anthropic key only (NO Gmail/clasp creds), runs Claude
#   verify  — diff-allow-list check, optional auto-merge
#
# AWS Parameter Store namespace: /cleanup-gmail/* (see docs/aws-bootstrap.md)

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:        # manual trigger for testing

# Least privilege: permissions are declared per-job, not workflow-wide.
permissions: {}

concurrency:
  group: feedback-loop
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: scan — has Gmail creds; produces feedback.json artifact
  # ---------------------------------------------------------------------------
  scan:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC into AWS to pull Gmail creds
      contents: read    # checkout
    # Skip until the user has populated repo variable AWS_ROLE_TO_ASSUME
    # per docs/aws-bootstrap.md. Until then the loop is dormant.
    if: vars.AWS_ROLE_TO_ASSUME != ''
    outputs:
      has_markers: ${{ steps.scan.outputs.has_markers }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false   # read-only job

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Pull Gmail credentials from Parameter Store
        run: |
          set -euo pipefail
          aws ssm get-parameter --name /cleanup-gmail/gmail-credentials-json \
            --with-decryption --query Parameter.Value --output text > credentials.json
          aws ssm get-parameter --name /cleanup-gmail/gmail-token-json \
            --with-decryption --query Parameter.Value --output text > token.json
          test -s credentials.json
          test -s token.json

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 pyyaml

      - name: Run feedback-scan
        id: scan
        run: |
          set -euo pipefail
          python -m gmail_cleanup feedback-scan --output feedback.json --exit-zero-on-empty
          count=$(python -c "import json; print(len(json.load(open('feedback.json'))['markers']))")
          echo "markers=$count"
          if [ "$count" -gt 0 ]; then
            echo "has_markers=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_markers=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload feedback.json artifact
        if: steps.scan.outputs.has_markers == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: feedback
          path: feedback.json
          retention-days: 7

      - name: Scrub Gmail credentials from runner
        if: always()
        run: |
          shred -u credentials.json token.json 2>/dev/null || rm -f credentials.json token.json

  # ---------------------------------------------------------------------------
  # Job 2: refine — Anthropic key only, Claude does the rule edits
  # ---------------------------------------------------------------------------
  refine:
    runs-on: ubuntu-latest
    needs: scan
    permissions:
      id-token: write       # OIDC into AWS to pull the Anthropic key
      contents: write       # push the refinement branch
      pull-requests: write  # open/label the PR
    if: needs.scan.outputs.has_markers == 'true'
    outputs:
      branch: ${{ steps.branch.outputs.name }}
      pr_number: ${{ steps.pr.outputs.number }}
    steps:
      # Containment: do NOT persist a push-capable token in git config. The
      # claude-code-action step below must run with no ambient write
      # credentials — the explicit push step at the end authenticates only for
      # that single push.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - name: Configure AWS via OIDC
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Pull Anthropic API key from Parameter Store
        id: secrets
        run: |
          set -euo pipefail
          key=$(aws ssm get-parameter --name /cleanup-gmail/anthropic-api-key \
            --with-decryption --query Parameter.Value --output text)
          echo "::add-mask::$key"
          echo "ANTHROPIC_API_KEY=$key" >> "$GITHUB_ENV"

      - name: Download feedback.json artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          name: feedback

      - name: Create refinement branch
        id: branch
        run: |
          name="loop/feedback-$(date -u +%Y%m%d-%H%M%S)"
          git config user.name "feedback-loop-bot"
          git config user.email "feedback-loop@noreply.local"
          git checkout -b "$name"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Set up Python (for test runs Claude triggers)
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 pyyaml pytest

      - name: Load runtime prompt
        id: load_prompt
        run: |
          {
            echo 'prompt<<EOF_FEEDBACK_PROMPT'
            cat .github/prompts/feedback-loop.md
            echo 'EOF_FEEDBACK_PROMPT'
          } >> "$GITHUB_OUTPUT"

      - name: Run claude-code-action
        uses: anthropics/claude-code-action@787c5a0ce96a9a6cfb050ea0c8f4c05f2447c251  # v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          prompt: ${{ steps.load_prompt.outputs.prompt }}
          # Claude may run pytest, python -m gmail_cleanup …, git, gh.
          # No external network access beyond pip/git/gh.

      - name: Push refinement branch
        # Authenticate only here — credentials were NOT persisted at checkout,
        # so Claude's step ran without push access. GITHUB_TOKEN is auto-masked.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          git -c http.extraheader="AUTHORIZATION: bearer ${GH_TOKEN}" \
            push -u origin "${{ steps.branch.outputs.name }}"

      - name: Open or update PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          existing=$(gh pr list --head ${{ steps.branch.outputs.name }} --json number -q '.[0].number' || echo "")
          if [ -z "$existing" ]; then
            url=$(gh pr create \
              --title "feedback-loop: $(date -u +%Y-%m-%d) refinement" \
              --body "Autonomous refinement from \`feedback-loop.yml\`. See commits for per-marker reasoning. Triage: corpus regression + property tests are CI-gated." \
              --label loop-autonomous)
            num=${url##*/}
          else
            num=$existing
          fi
          echo "number=$num" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Job 3: verify — diff-allow-list, optional auto-merge
  # ---------------------------------------------------------------------------
  verify:
    runs-on: ubuntu-latest
    needs: refine
    permissions:
      contents: read        # checkout
      pull-requests: write  # label/comment/close/merge the PR
      issues: write         # file a loop-broken issue on escape
    if: needs.refine.outputs.pr_number
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          ref: ${{ needs.refine.outputs.branch }}
          fetch-depth: 0
          persist-credentials: false   # uses GH_TOKEN env for gh, not git creds

      - name: Check allow-list of touched files
        id: allowlist
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ needs.refine.outputs.pr_number }}
        run: |
          set -euo pipefail
          # The only files Claude is permitted to modify:
          allowed_re='^(gmail_cleanup/rules\.yaml|tests/(corpus|corpus_disagreements)\.json|apps-script/(Rules|Classifier)\.gs|feedback_resolved\.json)$'
          touched=$(git diff --name-only origin/main...HEAD)
          echo "Touched files:"
          echo "$touched"
          violations=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            if ! echo "$f" | grep -qE "$allowed_re"; then
              violations="$violations\n$f"
            fi
          done <<< "$touched"
          if [ -n "$violations" ]; then
            printf "Violations:%b\n" "$violations"
            gh pr edit "$PR_NUMBER" --add-label loop-escape
            gh pr comment "$PR_NUMBER" --body "$(printf 'Loop escape detected — Claude wrote to files outside the allow-list:%b\n\nThis PR is being closed automatically.' "$violations")"
            gh pr close "$PR_NUMBER"
            gh issue create \
              --title "loop-escape: feedback-loop wrote to disallowed files" \
              --label loop-broken \
              --body "$(printf 'PR #%s touched off-list files:%b' "$PR_NUMBER" "$violations")"
            exit 1
          fi

      - name: Maybe auto-merge
        if: vars.LOOP_AUTO_MERGE == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr merge ${{ needs.refine.outputs.pr_number }} --auto --squash

  # ---------------------------------------------------------------------------
  # Heartbeat: any job failure → open a loop-broken issue
  # ---------------------------------------------------------------------------
  heartbeat:
    runs-on: ubuntu-latest
    needs: [scan, refine, verify]
    permissions:
      issues: write   # file a loop-broken issue on failure
    if: always() && (needs.scan.result == 'failure' || needs.refine.result == 'failure' || needs.verify.result == 'failure')
    steps:
      - name: File loop-broken issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "feedback-loop run ${{ github.run_id }} failed" \
            --label loop-broken \
            --body "scan=${{ needs.scan.result }} refine=${{ needs.refine.result }} verify=${{ needs.verify.result }}\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
