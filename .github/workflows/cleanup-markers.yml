name: cleanup-markers

# After a loop-autonomous PR merges, apply the Gmail-side cleanup for any
# +X/-X markers Claude resolved: add the target label to each source
# thread (or remove it for -X), then delete the marker label entirely.
#
# Source of truth for "what was resolved" = `feedback_resolved.json`
# committed by Claude as part of the PR.

on:
  pull_request:
    types: [closed]
    branches: [main]

# Least privilege: permissions are declared per-job, not workflow-wide.
permissions: {}

concurrency:
  group: cleanup-markers
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC into AWS to pull Gmail creds from Parameter Store
      contents: read    # checkout
    if: >-
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'loop-autonomous') &&
      vars.AWS_ROLE_TO_ASSUME != ''
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false   # job never pushes; don't leave a token on the runner

      - name: Bail if no resolved-markers file
        id: check
        run: |
          if [ ! -s feedback_resolved.json ]; then
            echo "no feedback_resolved.json — nothing to clean up"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS via OIDC
        if: steps.check.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a  # v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Restore Gmail credentials from Parameter Store
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          aws ssm get-parameter --name /cleanup-gmail/gmail-credentials-json \
            --with-decryption --query Parameter.Value --output text > credentials.json
          aws ssm get-parameter --name /cleanup-gmail/gmail-token-json \
            --with-decryption --query Parameter.Value --output text > token.json

      - name: Set up Python
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install google-api-python-client google-auth-oauthlib google-auth-httplib2 pyyaml

      - name: Run cleanup-markers
        if: steps.check.outputs.skip != 'true'
        run: |
          set -euo pipefail
          python -m gmail_cleanup cleanup-markers --input feedback_resolved.json

      - name: Scrub creds
        if: always()
        run: |
          shred -u credentials.json token.json 2>/dev/null || rm -f credentials.json token.json

  heartbeat:
    runs-on: ubuntu-latest
    needs: cleanup
    permissions:
      issues: write   # file a loop-broken issue on failure
    if: always() && needs.cleanup.result == 'failure'
    steps:
      - name: File loop-broken issue
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "cleanup-markers run ${{ github.run_id }} failed" \
            --label loop-broken \
            --body "Marker cleanup failed after merge of PR #${{ github.event.pull_request.number }}.\n\nThis means +X/-X labels may still be sitting on Gmail threads and the resolved target labels haven't been applied. Manual cleanup needed.\n\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
